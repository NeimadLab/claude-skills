version: "3.8"

services:
  loom:
    build:
      context: ../../
      dockerfile: deploy/docker/Dockerfile
    ports:
      - "8443:8443"
    volumes:
      - loom_data:/workspace/.loom
    environment:
      - LOOM_API_KEY=${LOOM_API_KEY:-}
      - LOOM_LOG_LEVEL=info
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8443/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  loom_data:
    driver: local
